<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Axes -->
  <line x1="30" y1="150" x2="270" y2="150" stroke="#999" stroke-width="1"/>
  <line x1="150" y1="270" x2="150" y2="30" stroke="#999" stroke-width="1"/>

  <!-- Axis labels -->
  <text x="265" y="167" font-family="serif" font-style="italic" font-size="16" fill="#555">θ</text>
  <text x="155" y="38" font-family="serif" font-style="italic" font-size="16" fill="#555">x</text>

  <!-- Circle -->
  <circle cx="150" cy="150" r="100" fill="none" stroke="#222" stroke-width="1.5"/>

  <!-- Thick arc neighbourhood around p1 (upper-right, ~30° to ~60°) -->
  <path d="M 236.6 100 A 100 100 0 0 0 200 63.4"
        fill="none" stroke="#4a7" stroke-width="5" stroke-linecap="round"/>

  <!-- p1 filled point at ~45° on upper semicircle -->
  <circle cx="220.7" cy="79.3" r="4" fill="#222"/>
  <!-- p1 label -->
  <text x="228" y="74" font-family="serif" font-style="italic" font-size="14" fill="#222">p₁</text>

  <!-- p2 hollow point at (1, 0) on the right -->
  <circle cx="250" cy="150" r="4" fill="white" stroke="#222" stroke-width="1.5"/>
  <!-- p2 label -->
  <text x="254" y="145" font-family="serif" font-style="italic" font-size="14" fill="#222">p₂</text>

  <!-- Dashed lines from p1 to axes -->
  <line x1="220.7" y1="79.3" x2="220.7" y2="150" stroke="#999" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="220.7" y1="79.3" x2="150" y2="79.3" stroke="#999" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Tick labels for p1 projections -->
  <text x="214" y="167" font-family="serif" font-style="italic" font-size="12" fill="#555">θ₁</text>
  <text x="132" y="83" font-family="serif" font-style="italic" font-size="12" fill="#555">x₁</text>
</svg>
