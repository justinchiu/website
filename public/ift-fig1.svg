<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220" width="300" height="220">
  <!-- Contour lines (ellipses suggesting an objective landscape) -->
  <ellipse cx="210" cy="80" rx="30" ry="20" fill="none" stroke="#ddd" stroke-width="1"/>
  <ellipse cx="210" cy="80" rx="55" ry="38" fill="none" stroke="#ddd" stroke-width="1"/>
  <ellipse cx="210" cy="80" rx="85" ry="58" fill="none" stroke="#ddd" stroke-width="1"/>
  <ellipse cx="210" cy="80" rx="120" ry="80" fill="none" stroke="#ddd" stroke-width="1"/>

  <!-- Squiggly solver path from x0 to x* -->
  <path d="M 60 170 C 75 155, 65 130, 90 125
           C 115 120, 100 105, 120 100
           C 140 95, 125 85, 145 82
           C 165 79, 155 72, 175 75
           C 195 78, 190 85, 210 80"
        fill="none" stroke="#e74c3c" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Arrowhead on squiggly path -->
  <polygon points="210,80 203,75 204,83" fill="#e74c3c"/>

  <!-- IFT dashed line from x0 to x* -->
  <line x1="60" y1="170" x2="210" y2="80" stroke="#2980b9" stroke-width="1.8" stroke-dasharray="6,4"/>

  <!-- Arrowhead on dashed line -->
  <polygon points="210,80 201,79 205,87" fill="#2980b9"/>

  <!-- x0 point -->
  <circle cx="60" cy="170" r="4.5" fill="#222"/>
  <text x="38" y="185" font-family="serif" font-style="italic" font-size="15" fill="#222">x₀</text>

  <!-- x* point -->
  <circle cx="210" cy="80" r="4.5" fill="#222"/>
  <text x="218" y="76" font-family="serif" font-style="italic" font-size="15" fill="#222">x*</text>

  <!-- Legend -->
  <line x1="40" y1="208" x2="60" y2="208" stroke="#e74c3c" stroke-width="1.8"/>
  <text x="65" y="212" font-family="sans-serif" font-size="11" fill="#666">solver trajectory</text>
  <line x1="160" y1="208" x2="180" y2="208" stroke="#2980b9" stroke-width="1.8" stroke-dasharray="6,4"/>
  <text x="185" y="212" font-family="sans-serif" font-size="11" fill="#666">IFT</text>
</svg>
